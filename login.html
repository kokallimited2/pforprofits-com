<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — pforprofits.com</title>
<meta name="description" content="Sign in to your pforprofits.com account to access your property investment tools and subscriptions.">
<link rel="canonical" href="https://pforprofits.com/login">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/membership.js"></script>
<style>
:root{--bg:#0a0a0f;--card:#13131a;--border:#1e1e2a;--text:#e0e0e8;--muted:#787890;--green:#22c55e;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px}
.auth-card h1{font-size:1.5rem;font-weight:700;margin-bottom:4px;text-align:center}
.auth-card p{color:var(--muted);font-size:0.9rem;margin-bottom:28px;text-align:center}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:0.85rem;font-weight:500;margin-bottom:6px;color:var(--text)}
.form-group input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;transition:border-color .2s}
.form-group input:focus{outline:none;border-color:var(--green)}
.form-group .error{color:var(--red);font-size:0.8rem;margin-top:4px;display:none}
.btn-primary{width:100%;padding:14px;background:var(--green);color:#000;border:none;border-radius:8px;font-weight:600;font-size:1rem;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.auth-footer{text-align:center;margin-top:24px;font-size:0.85rem;color:var(--muted)}
.auth-footer a{color:var(--green);text-decoration:none}
.auth-footer a:hover{text-decoration:underline}
.alert{display:none;padding:12px 16px;border-radius:8px;margin-bottom:20px;font-size:0.85rem}
.alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);display:block}
.alert-success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--green);display:block}
.forgot-link{display:block;text-align:right;font-size:0.8rem;margin-top:6px}
.forgot-link a{color:var(--muted);text-decoration:none}
.forgot-link a:hover{color:var(--green)}
.logo-link{text-align:center;margin-bottom:24px}
.logo-link a{color:var(--green);text-decoration:none;font-weight:700;font-size:1.1rem}
.spinner-ring{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="auth-card">
  <div class="logo-link"><a href="/">pforprofits.com</a></div>
  <h1>Welcome Back</h1>
  <p>Sign in to access your property investment tools.</p>
  
  <div id="alert-container"></div>
  
  <form id="login-form">
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
      <div class="forgot-link"><a href="#">Forgot password?</a></div>
    </div>
    <button type="submit" id="submit-btn" class="btn-primary">Sign In</button>
  </form>
  
  <div class="auth-footer">
    Don't have an account? <a href="/signup.html">Create one free</a>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');
  const alertContainer = document.getElementById('alert-container');
  
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-ring"></span> Signing in...';
  alertContainer.innerHTML = '';
  
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  btn.disabled = false;
  btn.innerHTML = 'Sign In';
  
  if (error) {
    alertContainer.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
    return;
  }
  
  // Success — redirect
  const params = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect') || '/';
  window.location.href = redirect;
});

// Pre-fill email from URL params
const params = new URLSearchParams(window.location.search);
if (params.get('email')) {
  document.getElementById('email').value = params.get('email');
}
</script>
</body>
</html>
