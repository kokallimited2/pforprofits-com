<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — pforprofits.com</title>
<meta name="description" content="Create your free pforprofits.com account and start analysing UK property deals instantly.">
<link rel="canonical" href="https://pforprofits.com/signup">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/membership.js"></script>
<style>
:root{--bg:#0a0a0f;--card:#13131a;--border:#1e1e2a;--text:#e0e0e8;--muted:#787890;--green:#22c55e;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px}
.auth-card h1{font-size:1.5rem;font-weight:700;margin-bottom:4px;text-align:center}
.auth-card p{color:var(--muted);font-size:0.9rem;margin-bottom:28px;text-align:center}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:0.85rem;font-weight:500;margin-bottom:6px;color:var(--text)}
.form-group input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;transition:border-color .2s}
.form-group input:focus{outline:none;border-color:var(--green)}
.btn-primary{width:100%;padding:14px;background:var(--green);color:#000;border:none;border-radius:8px;font-weight:600;font-size:1rem;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.auth-footer{text-align:center;margin-top:24px;font-size:0.85rem;color:var(--muted)}
.auth-footer a{color:var(--green);text-decoration:none}
.auth-footer a:hover{text-decoration:underline}
.alert{display:none;padding:12px 16px;border-radius:8px;margin-bottom:20px;font-size:0.85rem}
.alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);display:block}
.alert-success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--green);display:block}
.checkbox-group{display:flex;align-items:flex-start;gap:10px;margin-bottom:20px}
.checkbox-group input[type="checkbox"]{margin-top:3px;accent-color:var(--green);width:16px;height:16px;flex-shrink:0}
.checkbox-group label{font-size:0.85rem;color:var(--muted);line-height:1.5}
.logo-link{text-align:center;margin-bottom:24px}
.logo-link a{color:var(--green);text-decoration:none;font-weight:700;font-size:1.1rem}
.spinner-ring{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.pw-strength{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.pw-bar{height:100%;width:0%;border-radius:2px;transition:width .3s,background .3s}
</style>
</head>
<body>
<div class="auth-card">
  <div class="logo-link"><a href="/">pforprofits.com</a></div>
  <h1>Create Your Account</h1>
  <p>Free access to all property calculators. Upgrade anytime.</p>
  
  <div id="alert-container"></div>
  
  <form id="signup-form">
    <div class="form-group">
      <label for="name">Full name</label>
      <input type="text" id="name" placeholder="John Smith" autocomplete="name">
    </div>
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
      <div class="pw-strength"><div class="pw-bar" id="pw-bar"></div></div>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="terms" required>
      <label for="terms">I agree to the <a href="/privacy-policy.html" style="color:var(--green);text-decoration:none;">Privacy Policy</a> and understand this information is for educational purposes only and does not constitute financial advice.</label>
    </div>
    <button type="submit" id="submit-btn" class="btn-primary">Create Free Account</button>
  </form>
  
  <div class="auth-footer">
    Already have an account? <a href="/login.html">Sign in</a>
  </div>
</div>

<script>
// Password strength indicator
document.getElementById('password').addEventListener('input', function() {
  const bar = document.getElementById('pw-bar');
  const val = this.value.length;
  if (val === 0) { bar.style.width = '0%'; bar.style.background = ''; return; }
  if (val < 6) { bar.style.width = '20%'; bar.style.background = 'var(--red)'; }
  else if (val < 8) { bar.style.width = '40%'; bar.style.background = '#f59e0b'; }
  else { bar.style.width = '80%'; bar.style.background = 'var(--green)'; }
});

document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const name = document.getElementById('name').value;
  const btn = document.getElementById('submit-btn');
  const alertContainer = document.getElementById('alert-container');
  
  if (!document.getElementById('terms').checked) {
    alertContainer.innerHTML = '<div class="alert alert-error">Please agree to the terms to continue.</div>';
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-ring"></span> Creating account...';
  alertContainer.innerHTML = '';
  
  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: { full_name: name || '', subscription: 'free', subscription_status: 'active' }
    }
  });
  
  btn.disabled = false;
  btn.innerHTML = 'Create Free Account';
  
  if (error) {
    alertContainer.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
    return;
  }
  
  // Check if email confirmation is required
  if (data?.user?.identities?.length === 0) {
    alertContainer.innerHTML = '<div class="alert alert-success">Account created! Please check your email to confirm your account before signing in.</div>';
    return;
  }
  
  // Redirect to pricing to see upgrade options
  window.location.href = '/pricing.html';
});
</script>
</body>
</html>
