<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">
  <!-- House Icon -->
  <g transform="translate(8, 12)">
    <!-- House body -->
    <rect x="20" y="28" width="48" height="40" rx="3" fill="#0a1628"/>
    <!-- Roof -->
    <polygon points="44,2 8,28 80,28" fill="#d4a853"/>
    <!-- Door -->
    <rect x="36" y="40" width="16" height="28" rx="2" fill="#d4a853"/>
    <!-- Growth arrow on roof -->
    <polyline points="26,20 35,20 40,12 50,12 55,6" stroke="#0a1628" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Dot at arrow tip -->
    <circle cx="55" cy="6" r="2.5" fill="#0a1628"/>
  </g>

  <!-- Text -->
  <g transform="translate(105, 18)">
    <!-- p -->
    <text x="0" y="38" font-family="Inter, -apple-system, sans-serif" font-size="38" font-weight="600" fill="#0a1628" letter-spacing="-0.5">p</text>
    <!-- forprofits -->
    <text x="30" y="38" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="300" fill="#0a1628" letter-spacing="-0.3">forprofits</text>
    <!-- Green underline accent -->
    <line x1="0" y1="48" x2="195" y2="48" stroke="#d4a853" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
