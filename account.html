<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — pforprofits.com</title>
<meta name="description" content="Your pforprofits.com account dashboard — manage subscription, view saved deals, and access premium features.">
<link rel="canonical" href="https://pforprofits.com/account">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/membership.js"></script>
<style>
:root{--bg:#0a0a0f;--card:#13131a;--border:#1e1e2a;--text:#e0e0e8;--muted:#787890;--green:#22c55e;--blue:#3b82f6;--red:#ef4444;--orange:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.page{max-width:900px;margin:0 auto;padding:100px 24px 60px}

/* nav */
.nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-weight:700;font-size:1.1rem;color:var(--green);text-decoration:none}
.nav-links{display:flex;align-items:center;gap:24px}
.nav-right{display:flex;align-items:center;gap:12px}

h1{font-size:1.8rem;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--muted);font-size:0.9rem;margin-bottom:32px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.card h3{font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.card .value{font-size:1.5rem;font-weight:700}
.card .meta{font-size:0.85rem;color:var(--muted);margin-top:4px}

.profile-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;margin-bottom:24px}
.profile-section h2{font-size:1.1rem;font-weight:600;margin-bottom:20px}
.info-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:0.9rem}
.info-row:last-child{border-bottom:none}
.info-row .label{color:var(--muted)}
.info-row .value{font-weight:500}

.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.badge-free{background:rgba(120,120,144,0.15);color:var(--muted)}
.badge-pro{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-pending{background:rgba(245,158,11,0.15);color:var(--orange)}

.btn-primary{display:inline-block;padding:12px 24px;background:var(--green);color:#000!important;border-radius:8px;font-weight:600;font-size:0.9rem;text-decoration:none;border:none;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.btn-secondary{display:inline-block;padding:12px 24px;background:var(--border);color:var(--text)!important;border-radius:8px;font-weight:500;font-size:0.9rem;text-decoration:none;border:none;cursor:pointer;transition:opacity .2s;margin-left:12px}
.btn-secondary:hover{opacity:.8}
.btn-danger{display:inline-block;padding:12px 24px;background:rgba(239,68,68,0.1);color:var(--red)!important;border:1px solid rgba(239,68,68,0.3);border-radius:8px;font-weight:500;font-size:0.9rem;text-decoration:none;cursor:pointer;transition:opacity .2s}
.btn-danger:hover{opacity:.8}

.feature-list{list-style:none}
.feature-list li{padding:10px 0;border-bottom:1px solid var(--border);font-size:0.9rem;display:flex;align-items:center;gap:10px}
.feature-list li:last-child{border-bottom:none}
.feature-list .check{color:var(--green)}
.feature-list .locked{color:var(--muted);opacity:.5}

.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
.loading{text-align:center;padding:60px;color:var(--muted)}
.spinner-ring{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px;color:var(--muted)}
.empty-state h3{font-size:1.2rem;margin-bottom:8px;color:var(--text)}

footer{border-top:1px solid var(--border);padding:40px 24px 24px;margin-top:40px}
.footer-inner{max-width:900px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px}
.footer-inner a{color:var(--muted);text-decoration:none;font-size:0.85rem}
.footer-inner a:hover{color:var(--text)}
</style>
</head>
<body>
<nav class="nav">
<div class="nav-inner">
  <a href="/" class="nav-logo">pforprofits.com</a>
  <div class="nav-links">
    <a href="/">Tools</a>
    <a href="/guides/">Guides</a>
    <a href="/pricing.html">Pricing</a>
    <div class="nav-right" id="nav-right"></div>
  </div>
</div>
</nav>

<div class="page">
  <h1>My Account</h1>
  <p class="subtitle">Manage your profile, subscription, and saved deals.</p>
  
  <div id="account-content">
    <div class="loading">
      <div class="spinner-ring"></div>
      <p style="margin-top:12px;">Loading your account...</p>
    </div>
  </div>
</div>

<footer>
<div class="footer-inner">
  <span>© 2026 pforprofits.com</span>
  <a href="/privacy-policy.html">Privacy</a>
  <a href="/affiliate-disclosure.html">Disclosure</a>
  <a href="/">Home</a>
</div>
</footer>

<script>
async function loadAccount() {
  const container = document.getElementById('account-content');
  const state = await requireAuth();
  if (!state) return;
  
  const { user, isPro, subscriptionStatus } = state;
  const meta = user.user_metadata || {};
  const name = meta.full_name || user.email?.split('@')[0] || 'Investor';
  const created = new Date(user.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  
  const planBadge = isPro 
    ? '<span class="badge badge-pro">Pro Active</span>'
    : subscriptionStatus === 'pending'
    ? '<span class="badge badge-pending">Pending</span>'
    : '<span class="badge badge-free">Free</span>';
  
  const proFeatures = `
    <li><span class="check">✓</span> Unlimited deal saves & comparison</li>
    <li><span class="check">✓</span> Monthly UK market reports</li>
    <li><span class="check">✓</span> Area guides (PDF download)</li>
    <li><span class="check">✓</span> Advanced deal analytics</li>
    <li><span class="check">✓</span> Portfolio tracking</li>
    <li><span class="check">✓</span> Export reports (PDF/CSV)</li>
    <li><span class="check">✓</span> Priority email support</li>
    <li><span class="check">✓</span> Ad-free experience</li>
  `;
  
  const freeFeatures = `
    <li><span class="check">✓</span> BRRR Calculator</li>
    <li><span class="check">✓</span> Rental Yield Calculator</li>
    <li><span class="check">✓</span> Deal Analyser (basic)</li>
    <li><span class="check">✓</span> Stamp Duty Calculator</li>
    <li><span class="check">✓</span> Blog & Guides</li>
    <li><span class="locked">✗</span> Unlimited deal saves <span style="font-size:0.75rem;color:var(--muted)">(Pro)</span></li>
    <li><span class="locked">✗</span> Monthly market reports <span style="font-size:0.75rem;color:var(--muted)">(Pro)</span></li>
    <li><span class="locked">✗</span> Portfolio tracking <span style="font-size:0.75rem;color:var(--muted)">(Pro)</span></li>
    <li><span class="locked">✗</span> Export reports <span style="font-size:0.75rem;color:var(--muted)">(Pro)</span></li>
  `;
  
  container.innerHTML = `
    <!-- Stats Cards -->
    <div class="grid">
      <div class="card">
        <h3>Plan</h3>
        <div class="value">${planBadge}</div>
        <div class="meta">Since ${created}</div>
      </div>
      <div class="card">
        <h3>Status</h3>
        <div class="value" style="color:${isPro ? 'var(--green)' : 'var(--muted)'}">${isPro ? 'Active' : 'Free Tier'}</div>
        <div class="meta">${isPro ? 'Next billing: Check Stripe portal' : 'Upgrade for unlimited access'}</div>
      </div>
      <div class="card">
        <h3>Tools Access</h3>
        <div class="value" style="color:var(--blue);font-size:1.1rem">${isPro ? 'All Premium Tools' : 'Basic Tools'}</div>
        <div class="meta">${isPro ? 'Full access unlocked' : 'Upgrade to unlock pro features'}</div>
      </div>
    </div>
    
    <!-- Profile -->
    <div class="profile-section">
      <h2>Profile</h2>
      <div class="info-row">
        <span class="label">Name</span>
        <span class="value">${name}</span>
      </div>
      <div class="info-row">
        <span class="label">Email</span>
        <span class="value">${user.email}</span>
      </div>
      <div class="info-row">
        <span class="label">Member since</span>
        <span class="value">${created}</span>
      </div>
      <div class="info-row">
        <span class="label">Email confirmed</span>
        <span class="value" style="color:${user.email_confirmed_at ? 'var(--green)' : 'var(--orange)'}">${user.email_confirmed_at ? 'Yes' : 'Pending confirmation'}</span>
      </div>
    </div>
    
    <!-- Features -->
    <div class="profile-section">
      <h2>${isPro ? '✓ All Features Unlocked' : 'Your Plan: Free'}</h2>
      <ul class="feature-list">
        ${isPro ? proFeatures : freeFeatures}
      </ul>
      
      <div class="actions">
        ${isPro 
          ? `<button class="btn-secondary" onclick="window.location.href='/pricing.html'">Manage Plan</button>
             <button class="btn-danger" onclick="if(confirm('This will cancel your subscription. Continue?')) signOut();">Sign Out</button>`
          : `<a href="/pricing.html" class="btn-primary">Upgrade to Pro — £9.99/mo</a>
             <button class="btn-secondary" onclick="signOut()">Sign Out</button>`
        }
      </div>
    </div>
  `;
  
  updateNavAuth();
}

document.addEventListener('DOMContentLoaded', loadAccount);
</script>
</body>
</html>
