<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0a1628"/>
  <!-- Decorative gradient -->
  <rect width="1200" height="630" fill="url(#g)" opacity="0.3"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a853" stop-opacity="0"/>
      <stop offset="100%" stop-color="#d4a853" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- House icon large -->
  <g transform="translate(150, 165)">
    <rect x="40" y="80" width="160" height="120" rx="8" fill="#d4a853" opacity="0.2"/>
    <rect x="40" y="80" width="160" height="120" rx="8" fill="#d4a853" opacity="0.4"/>
    <polygon points="120,20 20,80 220,80" fill="#d4a853"/>
    <rect x="100" y="130" width="60" height="70" rx="4" fill="#0a1628"/>
    <polyline points="60,68 90,68 100,48 130,48 140,28" stroke="#0a1628" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="140" cy="28" r="6" fill="#0a1628"/>
  </g>

  <!-- Title -->
  <text x="440" y="260" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Property Investment</text>
  <text x="440" y="350" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Analysis Tools</text>

  <!-- Subtitle -->
  <text x="440" y="420" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="300" fill="rgba(255,255,255,0.7)">Free BRRR, Rental Yield &amp; Deal Analysis Calculators</text>

  <!-- URL -->
  <rect x="440" y="460" width="280" height="50" rx="25" fill="#d4a853"/>
  <text x="580" y="492" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#0a1628" text-anchor="middle">pforprofits.com</text>

  <!-- Bottom gold accent -->
  <rect x="0" y="620" width="1200" height="10" fill="#d4a853"/>
</svg>
